name: Bilder von Wix herunterladen

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prüfen, ob Bilder schon vorhanden sind
        id: check
        run: |
          if [ -f public/assets/img/hero.jpg ]; then
            echo "missing=false" >> "$GITHUB_OUTPUT"
          else
            echo "missing=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bilder herunterladen
        if: steps.check.outputs.missing == 'true'
        run: bash scripts/fetch-images.sh

      - name: Bilder committen
        if: steps.check.outputs.missing == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/assets/img
          git commit -m "Original-Bilder als lokale Kopien hinzufügen"
          git push
