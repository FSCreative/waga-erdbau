name: Schriften lokal einbetten (DSGVO)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prüfen, ob Schriften schon vorhanden sind
        id: check
        run: |
          if [ -f public/assets/fonts/fonts.css ]; then
            echo "missing=false" >> "$GITHUB_OUTPUT"
          else
            echo "missing=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Schriften herunterladen
        if: steps.check.outputs.missing == 'true'
        run: bash scripts/fetch-fonts.sh

      - name: Schriften committen
        if: steps.check.outputs.missing == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/assets/fonts
          git commit -m "Inter-Schriften als lokale Kopien einbetten (DSGVO)"
          git push
